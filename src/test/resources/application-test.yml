spring:
  datasource:
    url: jdbc:h2:mem:task_run_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:db/h2/schema.sql
      continue-on-error: false

logging:
  level:
    root: WARN
    com.qianyu: INFO
