server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: demo1
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml

# 日志级别配置（按需调整）
logging:
  level:
    root: INFO
    com.qianyu: DEBUG